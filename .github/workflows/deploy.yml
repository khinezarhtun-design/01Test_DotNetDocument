name: .NET CI/CD Production Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      # Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Install .NET 8 SDK
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Restore NuGet packages
      - name: Restore Dependencies
        run: dotnet restore WebApplication1/WebApplication1.csproj

      # Build application
      - name: Build Project
        run: dotnet build WebApplication1/WebApplication1.csproj --configuration Release --no-restore

      # Publish application
      - name: Publish Project
        run: dotnet publish WebApplication1/WebApplication1.csproj --configuration Release --output ./publish --no-build

      # Create deployment ZIP
      - name: Create Deployment Package
        run: |
          cd publish
          zip -r ../latest-build.zip .
          cd ..

      # Verify ZIP exists
      - name: Verify Package
        run: |
          ls -lh
          ls -lh latest-build.zip

      # Upload ZIP to EC2
      - name: Upload Package to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ec2-user
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: "latest-build.zip"
          target: "/var/www/deploy-package"

      # Run deployment script
      - name: Deploy Application
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ec2-user
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            bash /var/www/deploy/deployment.sh
            
